# 说明：
# 1) 本文件用于提供 upload 相关的公共默认值。
# 2) 业务模块（如 Server）可在 application*.properties 中使用同名键覆盖这里的配置。

# ==================== 文件存储目录默认配置 ====================
# 存储图片资源的相对路径
upload.directory.images.article_covers="/images/article_covers"
upload.directory.images.banners="/images/banners"
upload.directory.images.avatars="/images/avatars"


# ==================== WebP 图像处理默认配置 ====================
# 是否启用上传图片自动转 WebP（true=启用，false=关闭）
upload.webp.enabled=true
# WebP 压缩质量，取值范围 0.0~1.0（值越大质量越高、体积通常越大）
# 常用建议：0.75（高压缩）、0.85（平衡，推荐）、0.95（高质量）
upload.webp.quality=0.85
# 图片处理最大宽度（像素），超出后按比例缩放
upload.webp.max-width=2048
# 图片处理最大高度（像素），超出后按比例缩放
upload.webp.max-height=2048
# 转换成功后是否保留原图（true=保留原图+WebP，false=仅保留 WebP）
upload.webp.keep-original=false
# 转换失败策略：
# KEEP_ORIGINAL = 失败时回退保留原图（推荐）
# THROW_EXCEPTION = 失败时抛出异常中断上传
upload.webp.failure-strategy=KEEP_ORIGINAL
# 是否记录转换统计日志（如压缩前后体积、压缩率等）
upload.webp.enable-stats=true
